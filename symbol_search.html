<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Symbol Search</title>

  <script src="https://unpkg.com/jspsych@7.3.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
  <link href="https://unpkg.com/jspsych@7.3.2/css/jspsych.css" rel="stylesheet" />
</head>
<body></body>

<script>
  const jsPsych = initJsPsych();

  
  const expID = "owOXtEp7X285";


  const subject_id = jsPsych.randomization.randomID(10);

  let participant_id = "";

  const fullscreen = {
    type: jsPsychFullscreen,
    message: '<p><span style="font-size: 14pt">以下のボタンをクリックすると、画面は全画面表示に切り替わります1。</span></p>',
    button_label: "開始",
    fullscreen_mode: true
  };

  const form_trial = {
    type: jsPsychSurveyText,
    questions: [
      { prompt: "参加者IDを入力してください", name: "ID", required: true }
    ],
    button_label: "次へ",
    on_finish: function(data) {
      participant_id = data.response.ID;
    }
  };

  const welcome = {
    type: jsPsychHtmlButtonResponse,
    stimulus:
      "<p><span style='font-size: 13pt'>画面の上部と下部に記号の</span></p>" +
      "<p><span style='font-size: 13pt'>ペアが表示されます。</span></p>" +
      "<p><span style='font-size: 13pt'>上に表示されているペアとまったく同じ</span></p>" +
      "<p><span style='font-size: 13pt'>ペアを下から選んでタッチしてください。</span></p>" +
      "<img src='/Symbol_Search/ex-01.png' style='width: 250px; height: 300px;'>",
    choices: ["次へ"]
  };

  const instruction = {
    type: jsPsychHtmlButtonResponse,
    stimulus:
      "<p><span style='font-size: 13pt'>できるだけ早く、正しく選んでください。</span></p>" +
      "<p><span style='font-size: 12pt'>スタートを押して課題を開始してください。</span></p>",
    choices: ["スタート"]
  };

  const allImages = [
    "/Symbol_Search/ss-01.svg",
    "/Symbol_Search/ss-02.svg",
    "/Symbol_Search/ss-03.svg",
    "/Symbol_Search/ss-04.svg",
    "/Symbol_Search/ss-05.svg",
    "/Symbol_Search/ss-06.svg",
    "/Symbol_Search/ss-07.svg",
    "/Symbol_Search/ss-08.svg",
    "/Symbol_Search/ss-09.svg",
    "/Symbol_Search/ss-10.svg",
    "/Symbol_Search/ss-11.svg",
    "/Symbol_Search/ss-12.svg",
    "/Symbol_Search/ss-13.svg",
    "/Symbol_Search/ss-14.svg",
    "/Symbol_Search/ss-15.svg",
    "/Symbol_Search/ss-16.svg",
    "/Symbol_Search/ss-17.svg",
    "/Symbol_Search/ss-18.svg",
    "/Symbol_Search/ss-19.svg",
    "/Symbol_Search/ss-20.svg",
    "/Symbol_Search/ss-21.svg",
    "/Symbol_Search/ss-22.svg",
    "/Symbol_Search/ss-23.svg",
    "/Symbol_Search/ss-24.svg"
  ];

  function getRandomImage(images) {
    const randomIndex = Math.floor(Math.random() * images.length);
    return images[randomIndex];
  }

  const stimuli = [];

  for (let i = 0; i < 2; i++) {
    const chosenImages = [];
    while (chosenImages.length < 22) {
      const randomImage = getRandomImage(allImages);
      if (!chosenImages.includes(randomImage)) {
        chosenImages.push(randomImage);
      }
    }

    const frameImages = [
      [chosenImages[0], chosenImages[1]],
      [chosenImages[2], chosenImages[3]],
      [chosenImages[4], chosenImages[5]]
    ];

    const correctFrameIndex = Math.floor(Math.random() * 3);
    const targetImages = frameImages[correctFrameIndex];

    const additionalTargetImages = [];
    while (additionalTargetImages.length < 2) {
      const additionalTargetImage = getRandomImage(
        allImages.filter(img =>
          !chosenImages.includes(img) &&
          !additionalTargetImages.includes(img)
        )
      );
      additionalTargetImages.push(additionalTargetImage);
    }

    const combinedTargets = [
      "<div style='display: inline-block; border: 4px solid black; padding: 0px; margin-right: 5px; width: 100px; text-align: center;'>" +
        "<div style='display: flex; flex-direction: column; align-items: center;'>" +
        "<img src='" + targetImages[0] + "' width='140px' height='130px' style='margin-bottom: -15px;'/>" +
        "<img src='" + targetImages[1] + "' width='140px' height='130px' style='margin-top: -25px;'/></div></div>",
      "<div style='display: inline-block; border: 4px solid black; padding: 0px; margin-right: 5px; width: 100px; text-align: center;'>" +
        "<div style='display: flex; flex-direction: column; align-items: center;'>" +
        "<img src='" + additionalTargetImages[0] + "' width='140px' height='130px' style='margin-bottom: -15px;'/>" +
        "<img src='" + additionalTargetImages[1] + "' width='140px' height='130px' style='margin-top: -25px;'/></div></div>"
    ];

    let shuffledTargets;
    let correctPosition;

    if (Math.random() < 0.5) {
      shuffledTargets = [combinedTargets[0], combinedTargets[1]];
      correctPosition = 0;
    } else {
      shuffledTargets = [combinedTargets[1], combinedTargets[0]];
      correctPosition = 1;
    }

    stimuli.push({
      stimulus:
        "<div style='display: flex; flex-direction: column; align-items: center; margin-bottom: 0px; padding: 10px;'>" +
        "<div style='display: flex; justify-content: center;'>" +
        "<div style='border: 4px solid black; padding: 0px; width: 100px; display: flex; flex-direction: column; align-items: center; margin-right: 10px;'>" +
        "<img src='" + frameImages[0][0] + "' width='140px' height='130px' style='margin-bottom: -15px;'/>" +
        "<img src='" + frameImages[0][1] + "' width='140px' height='130px' style='margin-top: -25px;'/></div>" +
        "<div style='border: 4px solid black; padding: 0px; width: 100px; display: flex; flex-direction: column; align-items: center; margin-right: 10px;'>" +
        "<img src='" + frameImages[1][0] + "' width='140px' height='130px' style='margin-bottom: -15px;'/>" +
        "<img src='" + frameImages[1][1] + "' width='140px' height='130px' style='margin-top: -25px;'/></div>" +
        "<div style='border: 4px solid black; padding: 0px; width: 100px; display: flex; flex-direction: column; align-items: center;'>" +
        "<img src='" + frameImages[2][0] + "' width='140px' height='130px' style='margin-bottom: -15px;'/>" +
        "<img src='" + frameImages[2][1] + "' width='140px' height='130px' style='margin-top: -25px;'/></div>" +
        "</div>" +
        "<div style='text-align: center; margin: 20px; font-size: 18px;'>どれが上のペアと一致しますか？</div>" +
        "</div>",
      target: shuffledTargets,
      data: {
        no: (i + 1).toString(),
        stim_type: "normal",
        correct_position: correctPosition
      }
    });
  }

  const task_procedure = {
    timeline: [
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: "<p style='font-size:60pt;'>+</p>",
        data: { stim_type: "stay" },
        trial_duration: function() {
          return Math.floor(Math.random() * 1500) + 500;
        },
        response_ends_trial: false
      },
      {
        type: jsPsychHtmlButtonResponse,
        stimulus: jsPsych.timelineVariable("stimulus"),
        choices: jsPsych.timelineVariable("target"),
        button_html: '<button class="jspsych-btn">%choice%</button>',
        trial_duration: 20000,
        data: jsPsych.timelineVariable("data"),
        on_finish: function(data) {
          data.correct = Number(data.correct_position == data.response);
          data.participant_id = participant_id;
          data.subject_id = subject_id;
        }
      }
    ],
    timeline_variables: stimuli,
    sample: { type: "fixed-repetitions", size: 1 }
  };

  const debrief = {
    type: jsPsychHtmlButtonResponse,
    stimulus: "<p>下の課題完了ボタンを押た後，ブラウザを閉じて終了してください。ご参加ありがとうございました。</p>",
    choices: ["課題完了"]
  };

  const save_data = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: expID,
    filename: () => `symbol_sm_${participant_id}_${subject_id}.csv`,
    data_string: () => jsPsych.data.get().csv()
  };

  const timeline = [
    fullscreen,
    form_trial,
    welcome,
    instruction,
    task_procedure,
    debrief,
    save_data
  ];

  jsPsych.run(timeline);
</script>
</html>
